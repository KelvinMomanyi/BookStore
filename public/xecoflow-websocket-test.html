<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XecoFlow WebSocket Test</title>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 800px;
        margin: 50px auto;
        padding: 20px;
      }

      .status {
        padding: 15px;
        margin: 20px 0;
        border-radius: 5px;
        font-weight: bold;
      }

      .connected {
        background: #4caf50;
        color: white;
      }

      .error {
        background: #f44336;
        color: white;
      }

      .info {
        background: #2196f3;
        color: white;
      }

      .payment {
        background: #f0f0f0;
        padding: 10px;
        margin: 10px 0;
        border-left: 4px solid #ff9800;
        border-radius: 3px;
      }

      button {
        background: #ff9800;
        color: white;
        border: none;
        padding: 10px 20px;
        margin: 5px;
        cursor: pointer;
        border-radius: 5px;
        font-size: 16px;
      }

      button:hover {
        background: #f57c00;
      }

      input {
        padding: 10px;
        width: 400px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 14px;
      }

      #log {
        background: #1e1e1e;
        color: #d4d4d4;
        padding: 10px;
        height: 300px;
        overflow-y: auto;
        font-family: monospace;
        font-size: 12px;
        border-radius: 5px;
        margin-top: 20px;
      }

      .log-entry {
        padding: 5px;
        border-bottom: 1px solid #333;
      }

      .log-time {
        color: #888;
      }

      .success {
        color: #4caf50;
      }

      .error-text {
        color: #f44336;
      }
    </style>
  </head>
  <body>
    <h1>XecoFlow WebSocket Test</h1>
    <p>Use your business API key to verify payment updates.</p>

    <div>
      <label for="apiKey"><strong>API Key:</strong></label><br />
      <input
        type="text"
        id="apiKey"
        placeholder="Enter business API key"
      />
      <br />
      <label for="socketUrl"><strong>Socket URL:</strong></label><br />
      <input
        type="text"
        id="socketUrl"
        placeholder="https://your-gateway-domain/business"
      />
      <div>
        <button type="button" onclick="connectSocket()">Connect</button>
        <button type="button" onclick="disconnectSocket()">Disconnect</button>
      </div>
    </div>

    <div id="status" class="status info">Click Connect to start.</div>

    <div>
      <h3>Payment Updates</h3>
      <div id="payments" style="min-height: 150px"></div>
    </div>

    <div>
      <h3>Connection Log</h3>
      <div id="log"></div>
    </div>

    <script>
      let socket = null;
      const API_KEY_STORAGE = "xeco_test_api_key";
      const SOCKET_URL_STORAGE = "xeco_test_socket_url";

      const apiKeyInput = document.getElementById("apiKey");
      const socketUrlInput = document.getElementById("socketUrl");
      apiKeyInput.value = localStorage.getItem(API_KEY_STORAGE) || "";
      socketUrlInput.value = localStorage.getItem(SOCKET_URL_STORAGE) || "";

      const addToLog = (message, type = "info") => {
        const logDiv = document.getElementById("log");
        const time = new Date().toLocaleTimeString();
        const entry = document.createElement("div");
        entry.className = "log-entry";

        let color = "";
        if (type === "success") color = "success";
        if (type === "error") color = "error-text";

        entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="${color}">${message}</span>`;
        logDiv.appendChild(entry);
        logDiv.scrollTop = logDiv.scrollHeight;
      };

      const addPayment = (payment) => {
        const paymentsDiv = document.getElementById("payments");
        const paymentDiv = document.createElement("div");
        paymentDiv.className = "payment";

        const eventName =
          (payment?.event || payment?.status || "payment-update").toString();
        const isSuccess = eventName.toLowerCase().includes("success");
        const borderColor = isSuccess ? "#4caf50" : "#f44336";
        paymentDiv.style.borderLeftColor = borderColor;

        const amount = payment?.amount ?? "N/A";
        const phone = payment?.phone || payment?.phoneNumber || "N/A";
        const transactionId =
          payment?.transaction_id ||
          payment?.transactionId ||
          payment?.MpesaReceiptNumber ||
          "N/A";
        const reason = payment?.failure_reason || payment?.failureReason || "";

        paymentDiv.innerHTML = `
          <strong>${eventName}</strong><br />
          Amount: KES ${amount}<br />
          Phone: ${phone}<br />
          Transaction: ${transactionId}<br />
          ${reason ? `Reason: ${reason}<br />` : ""}
          Time: ${new Date().toLocaleString()}
        `;

        paymentsDiv.insertBefore(paymentDiv, paymentsDiv.firstChild);

        while (paymentsDiv.children.length > 10) {
          paymentsDiv.removeChild(paymentsDiv.lastChild);
        }
      };

      const connectSocket = () => {
        const apiKey = document.getElementById("apiKey").value.trim();
        const socketUrl = document.getElementById("socketUrl").value.trim();
        const statusDiv = document.getElementById("status");

        if (!apiKey) {
          statusDiv.textContent = "Please enter an API key.";
          statusDiv.className = "status error";
          addToLog("No API key provided.", "error");
          return;
        }
        if (!socketUrl) {
          statusDiv.textContent = "Please enter a socket URL.";
          statusDiv.className = "status error";
          addToLog("No socket URL provided.", "error");
          return;
        }

        statusDiv.textContent = "Connecting to WebSocket...";
        statusDiv.className = "status info";
        addToLog(
          `Connecting to ${socketUrl} with API key: ${apiKey.substring(0, 20)}...`,
          "info"
        );

        socket = io(socketUrl, {
          auth: { apiKey, serviceType: "payment" },
          query: { serviceType: "payment" },
          transports: ["websocket", "polling"],
          reconnection: true,
          reconnectionAttempts: 5,
          timeout: 10000
        });

        socket.on("connect", () => {
          localStorage.setItem(API_KEY_STORAGE, apiKey);
          localStorage.setItem(SOCKET_URL_STORAGE, socketUrl);
          statusDiv.textContent =
            "Connected. Waiting for payment updates from business channel.";
          statusDiv.className = "status connected";
          addToLog(`Connected successfully. Socket ID: ${socket.id}`, "success");
        });

        socket.on("connected", (data) => {
          addToLog(
            `Server ready: ${data?.message || "ok"} (Business: ${
              data?.businessShortcode || "N/A"
            })`,
            "success"
          );
        });

        socket.on("payment-update", (payment) => {
          const eventName = payment?.event || payment?.status || "payment-update";
          addToLog(
            `Payment update: ${eventName} - KES ${payment?.amount ?? "N/A"}`,
            "success"
          );
          addPayment(payment);
        });

        socket.on("pong", (data) => {
          const stamp = data?.timestamp
            ? new Date(data.timestamp).toLocaleTimeString()
            : new Date().toLocaleTimeString();
          addToLog(`Heartbeat received at ${stamp}`, "info");
        });

        socket.on("disconnect", (reason) => {
          statusDiv.textContent = `Disconnected: ${reason}`;
          statusDiv.className = "status error";
          addToLog(`Disconnected: ${reason}`, "error");
        });

        socket.on("connect_error", (error) => {
          statusDiv.textContent = `Connection failed: ${error.message}`;
          statusDiv.className = "status error";
          addToLog(`Connection error: ${error.message}`, "error");
        });
      };

      const disconnectSocket = () => {
        if (!socket) return;

        socket.disconnect();
        socket = null;

        const statusDiv = document.getElementById("status");
        statusDiv.textContent = "Disconnected";
        statusDiv.className = "status info";
        addToLog("Disconnected manually.", "info");
      };

      addToLog('Ready. Click "Connect" to start.', "info");
    </script>
  </body>
</html>
